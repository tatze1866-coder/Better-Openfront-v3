<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>OpenFront Klon</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <!-- Hauptmenü -->
  <div id="menu" class="screen active">
    <<div class="menu-card">

    <h1 class="logo">BETTER OPENFRONT</h1>

    <input id="nameInput" type="text" maxlength="16" placeholder="Spielername eingeben...">

    <div class="modeButtons">
        <button id="btnSolo" class="green">👤 SOLO SPIEL</button>
        <button id="btnCreate" class="blue">👥 MEHRSPIELER</button>
    </div>

    <button id="btnStartBig" class="playButton">
        ⚔ SPIEL STARTEN
    </button>

    <div class="bottomButtons">
        <button>⚙ Einstellungen</button>
        <button>📖 Anleitung</button>
        <button>⭐ Credits</button>
    </div>

</div>

<div class="version">
v0.0.1
</div>
